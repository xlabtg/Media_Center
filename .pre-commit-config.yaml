exclude: |
  (?x)^(
    experiments/|
    (?:.*/)?\.gitkeep$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: ["--strict"]
        additional_dependencies:
          - pydantic==2.13.4
          - pydantic-settings==2.14.1
          - fastapi==0.137.2
          - httpx==0.28.1
          - SQLAlchemy==2.0.51
          - alembic==1.18.4
          - asyncpg==0.31.0
          - pytest==9.1.0
          - Jinja2==3.1.6
