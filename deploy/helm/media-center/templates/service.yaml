{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "media-center.serviceFullname" (dict "root" $ "serviceName" $serviceName) }}
  labels:
    {{- include "media-center.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
spec:
  type: {{ $.Values.service.type }}
  ports:
    - name: http
      port: {{ $.Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "media-center.selectorLabels" (dict "root" $ "serviceName" $serviceName) | nindent 4 }}
---
{{- end }}
{{- end }}
