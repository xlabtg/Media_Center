global:
  resolve_timeout: 5m

route:
  group_by: ['tenant_id', 'service', 'alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: sre-oncall
  routes:
    - receiver: security-privacy
      matchers:
        - team="security"
      continue: true
    - receiver: council-escalation
      matchers:
        - severity="critical"
      continue: true

receivers:
  - name: sre-oncall
  - name: council-escalation
  - name: security-privacy

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['tenant_id', 'service', 'alertname']
