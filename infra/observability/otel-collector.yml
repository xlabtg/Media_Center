receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource/local:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert
  transform/tenant_context:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - keep_keys(attributes, ["tenant_id", "service.name", "operation", "correlation_id", "http.method", "http.route", "http.status_code"])
    log_statements:
      - context: log
        statements:
          - keep_keys(attributes, ["tenant_id", "service.name", "operation", "correlation_id", "trace_id", "span_id", "level"])
    metric_statements:
      - context: datapoint
        statements:
          - keep_keys(attributes, ["tenant_id", "service", "operation", "status"])
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/local, transform/tenant_context, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/local, transform/tenant_context, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/local, transform/tenant_context, batch]
      exporters: [debug]
