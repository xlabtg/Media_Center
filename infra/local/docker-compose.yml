name: ${COMPOSE_PROJECT_NAME:-media-center-local}

x-app-build-common: &app-build-common
  context: ../..
  dockerfile: infra/docker/service.Dockerfile

x-app-build-args-common: &app-build-args-common
  SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0-local}
  BUILD_DATE: ${BUILD_DATE:-1970-01-01T00:00:00Z}
  GIT_COMMIT: ${GIT_COMMIT:-local}
  GIT_TAG: ${GIT_TAG:-}
  IMAGE_SOURCE: ${IMAGE_SOURCE:-https://github.com/xlabtg/Media_Center}

x-app-environment-common: &app-environment-common
  APP_ENV: ${APP_ENV:-development}
  APP_HOST: "0.0.0.0"
  APP_PORT: "7700"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0-local}
  JWT_SECRET: ${JWT_SECRET:-nmc_local_jwt_secret}
  S2S_AUTH_METHOD: ${S2S_AUTH_METHOD:-shared_secret}
  S2S_SHARED_SECRET: ${S2S_SHARED_SECRET:-nmc_local_s2s_secret}
  PROMETHEUS_ENABLED: "true"
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nmc}:${POSTGRES_PASSWORD:-nmc_dev_password}@postgres:5432/${POSTGRES_DB:-nmc}"
  REDIS_URL: "redis://redis:6379/0"
  RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:-nmc}:${RABBITMQ_DEFAULT_PASS:-nmc_dev_password}@rabbitmq:5672/"
  CHROMA_HOST: chroma
  CHROMA_PORT: "8000"
  CHROMA_SSL: "false"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-nmc_minio}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-nmc_minio_dev_password}
  S3_BUCKET: ${MINIO_BUCKET:-nmc-dev}
  S3_REGION: ${MINIO_REGION:-ru-central-1}
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  BLOCKCHAIN_AUDITOR_URL: ${BLOCKCHAIN_AUDITOR_URL:-grpc://besu-auditor.internal:50051}

x-app-service-common: &app-service-common
  restart: unless-stopped
  user: "1000:1000"
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,mode=1777
    - /app/logs:rw,noexec,nosuid,nodev,mode=0775,uid=1000,gid=1000
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  expose:
    - "7700"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    chroma:
      condition: service_healthy
    minio:
      condition: service_healthy
    otel-collector:
      condition: service_healthy
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:7700/health', timeout=3).read()",
      ]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 10s

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nmc}
      POSTGRES_USER: ${POSTGRES_USER:-nmc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nmc_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/migrations:/migrations:ro
      - ./postgres/seeds:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-nmc}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-nmc_dev_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8000; printf \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r status <&3; [[ \"$$status\" == *\" 200 \"* ]]'",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nmc_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nmc_minio_dev_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-nmc-dev}
      MINIO_REGION: ${MINIO_REGION:-ru-central-1}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.5.4
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
      - alertmanager
    healthcheck:
      test: ["CMD", "promtool", "check", "config", "/etc/prometheus/prometheus.yml"]
      interval: 30s
      timeout: 10s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.29.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ../observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "amtool", "check-config", "/etc/alertmanager/alertmanager.yml"]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:12.4.4
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-nmc}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-nmc_grafana_dev_password}
      GF_USERS_DEFAULT_THEME: light
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "grafana cli --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_PROMETHEUS_PORT:-8889}:8889"
    volumes:
      - ../observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    healthcheck:
      test:
        [
          "CMD",
          "otelcol-contrib",
          "validate",
          "--config=/etc/otelcol-contrib/config.yml",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  activity-command-center:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-activity-command-center:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: activity-command-center
        SERVICE_PATH: services/activity-command-center
    environment:
      <<: *app-environment-common
      SERVICE_NAME: activity-command-center
    ports:
      - "${ACTIVITY_COMMAND_CENTER_PORT:-7701}:7700"

  analytics-engine:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-analytics-engine:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: analytics-engine
        SERVICE_PATH: services/analytics-engine
    environment:
      <<: *app-environment-common
      SERVICE_NAME: analytics-engine
    ports:
      - "${ANALYTICS_ENGINE_PORT:-7702}:7700"

  api-gateway:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-api-gateway:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: api-gateway
        SERVICE_PATH: services/api-gateway
    environment:
      <<: *app-environment-common
      SERVICE_NAME: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-7703}:7700"

  blockchain-auditor:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-blockchain-auditor:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: blockchain-auditor
        SERVICE_PATH: services/blockchain-auditor
    environment:
      <<: *app-environment-common
      SERVICE_NAME: blockchain-auditor
    ports:
      - "${BLOCKCHAIN_AUDITOR_PORT:-7704}:7700"

  cglr:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-cglr:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: cglr
        SERVICE_PATH: services/cglr
    environment:
      <<: *app-environment-common
      SERVICE_NAME: cglr
    ports:
      - "${CGLR_PORT:-7705}:7700"

  contribution-ledger:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-contribution-ledger:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: contribution-ledger
        SERVICE_PATH: services/contribution-ledger
    environment:
      <<: *app-environment-common
      SERVICE_NAME: contribution-ledger
    ports:
      - "${CONTRIBUTION_LEDGER_PORT:-7706}:7700"

  hitl-payout-gateway:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-hitl-payout-gateway:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: hitl-payout-gateway
        SERVICE_PATH: services/hitl-payout-gateway
    environment:
      <<: *app-environment-common
      SERVICE_NAME: hitl-payout-gateway
    ports:
      - "${HITL_PAYOUT_GATEWAY_PORT:-7707}:7700"

  messenger-adapter:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-messenger-adapter:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: messenger-adapter
        SERVICE_PATH: services/messenger-adapter
    environment:
      <<: *app-environment-common
      SERVICE_NAME: messenger-adapter
    ports:
      - "${MESSENGER_ADAPTER_PORT:-7708}:7700"

  neuro-agent-orchestrator:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-neuro-agent-orchestrator:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: neuro-agent-orchestrator
        SERVICE_PATH: services/neuro-agent-orchestrator
    environment:
      <<: *app-environment-common
      SERVICE_NAME: neuro-agent-orchestrator
    ports:
      - "${NEURO_AGENT_ORCHESTRATOR_PORT:-7709}:7700"

  notification-gateway:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-notification-gateway:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: notification-gateway
        SERVICE_PATH: services/notification-gateway
    environment:
      <<: *app-environment-common
      SERVICE_NAME: notification-gateway
    ports:
      - "${NOTIFICATION_GATEWAY_PORT:-7710}:7700"

  policy-manager:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-policy-manager:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: policy-manager
        SERVICE_PATH: services/policy-manager
    environment:
      <<: *app-environment-common
      SERVICE_NAME: policy-manager
    ports:
      - "${POLICY_MANAGER_PORT:-7711}:7700"

  voice-to-chain:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-voice-to-chain:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: voice-to-chain
        SERVICE_PATH: services/voice-to-chain
    environment:
      <<: *app-environment-common
      SERVICE_NAME: voice-to-chain
    ports:
      - "${VOICE_TO_CHAIN_PORT:-7712}:7700"

  wallet:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-wallet:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: wallet
        SERVICE_PATH: services/wallet
    environment:
      <<: *app-environment-common
      SERVICE_NAME: wallet
    ports:
      - "${WALLET_PORT:-7713}:7700"

  web-cabinet:
    <<: *app-service-common
    image: ghcr.io/${GHCR_OWNER:-xlabtg}/media-center-web-cabinet:${IMAGE_TAG:-latest}
    build:
      <<: *app-build-common
      args:
        <<: *app-build-args-common
        SERVICE_NAME: web-cabinet
        SERVICE_PATH: services/web-cabinet
    environment:
      <<: *app-environment-common
      SERVICE_NAME: web-cabinet
    ports:
      - "${WEB_CABINET_PORT:-7714}:7700"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  chroma-data:
  minio-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
