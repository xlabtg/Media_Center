name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - issue-9-df5fa4653e80
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Pytest with coverage
        run: >
          pytest --cov=libs --cov=services
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.1

      - name: Audit Python project dependencies
        run: pip-audit . --progress-spinner off

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Secret scan
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --no-banner --redact --verbose

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  images:
    name: Build service image (${{ matrix.service }})
    uses: ./.github/workflows/build-service.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - activity-command-center
          - analytics-engine
          - api-gateway
          - blockchain-auditor
          - cglr
          - contribution-ledger
          - hitl-payout-gateway
          - messenger-adapter
          - neuro-agent-orchestrator
          - notification-gateway
          - policy-manager
          - voice-to-chain
          - wallet
          - web-cabinet
    with:
      service: ${{ matrix.service }}
    secrets: inherit
