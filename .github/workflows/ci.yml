name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - issue-9-df5fa4653e80
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Pytest with coverage
        run: >
          pytest --cov=libs --cov=services
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.1

      - name: Audit Python project dependencies
        run: pip-audit . --progress-spinner off

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Secret scan
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --no-banner --redact --verbose

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  images:
    name: Build service image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: api-gateway
            path: services/api-gateway
          - service: contribution-ledger
            path: services/contribution-ledger
          - service: cglr
            path: services/cglr
          - service: hitl-payout-gateway
            path: services/hitl-payout-gateway
          - service: messenger-adapter
            path: services/messenger-adapter
          - service: notification-gateway
            path: services/notification-gateway
          - service: blockchain-auditor
            path: services/blockchain-auditor
          - service: voice-to-chain
            path: services/voice-to-chain
          - service: wallet
            path: services/wallet
          - service: web-cabinet
            path: services/web-cabinet

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          docker build \
            --file infra/docker/service.Dockerfile \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            --build-arg SERVICE_PATH=${{ matrix.path }} \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label "org.opencontainers.image.title=Media Center ${{ matrix.service }}" \
            --tag media-center-${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: infra/docker/service.Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PATH=${{ matrix.path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Media Center ${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
