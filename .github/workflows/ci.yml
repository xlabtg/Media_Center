name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - issue-9-df5fa4653e80
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Pytest with coverage
        run: >
          pytest --cov=libs --cov=services
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.1

      - name: Audit Python project dependencies
        run: pip-audit . --progress-spinner off

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Secret scan
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --no-banner --redact --verbose

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  images:
    name: Build service image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            path: services/api-gateway
          - service: contribution-ledger
            path: services/contribution-ledger
          - service: cglr
            path: services/cglr
          - service: hitl-payout-gateway
            path: services/hitl-payout-gateway
          - service: messenger-adapter
            path: services/messenger-adapter
          - service: notification-gateway
            path: services/notification-gateway
          - service: blockchain-auditor
            path: services/blockchain-auditor
          - service: voice-to-chain
            path: services/voice-to-chain
          - service: wallet
            path: services/wallet
          - service: web-cabinet
            path: services/web-cabinet

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.1.0
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Resolve build metadata
        id: build-metadata
        shell: bash
        run: bash .github/scripts/resolve-build-metadata.sh

      - name: Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},enable=${{ steps.build-metadata.outputs.official_semver == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.build-metadata.outputs.official_semver == 'true' }}
            type=match,pattern=^v?([0-9]+\.[0-9]+\.[0-9]+.*)$,group=1,enable=${{ steps.build-metadata.outputs.official_semver != 'true' }}
            type=match,pattern=^v?([0-9]+\.[0-9]+)\.[0-9]+.*$,group=1,enable=${{ steps.build-metadata.outputs.official_semver != 'true' }}
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.source=${{ steps.build-metadata.outputs.image_source }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build-metadata.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.build-metadata.outputs.service_version }}
            org.opencontainers.image.title=Media Center ${{ matrix.service }}

      - name: Build image for Trivy scan
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: infra/docker/service.Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PATH=${{ matrix.path }}
            BUILD_DATE=${{ steps.build-metadata.outputs.build_date }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ steps.build-metadata.outputs.git_tag }}
            SERVICE_VERSION=${{ steps.build-metadata.outputs.service_version }}
            IMAGE_SOURCE=${{ steps.build-metadata.outputs.image_source }}
          push: false
          load: true
          platforms: linux/amd64
          tags: media-center-${{ matrix.service }}:trivy-scan
          labels: ${{ steps.docker-metadata.outputs.labels }}
          cache-from: type=gha

      - name: Prepare Trivy image scan report directory
        run: mkdir -p trivy-reports

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: media-center-${{ matrix.service }}:trivy-scan
          scanners: vuln
          format: sarif
          output: trivy-reports/media-center-${{ matrix.service }}.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true

      - name: Upload Trivy image scan report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-image-scan-${{ matrix.service }}
          path: trivy-reports/media-center-${{ matrix.service }}.sarif
          if-no-files-found: warn

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build-image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: infra/docker/service.Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PATH=${{ matrix.path }}
            BUILD_DATE=${{ steps.build-metadata.outputs.build_date }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ steps.build-metadata.outputs.git_tag }}
            SERVICE_VERSION=${{ steps.build-metadata.outputs.service_version }}
            IMAGE_SOURCE=${{ steps.build-metadata.outputs.image_source }}
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Sign image digest
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}@${{ steps.build-image.outputs.digest }}

      - name: Attest SLSA provenance
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Prepare SBOM directory
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: mkdir -p sbom

      - name: Generate SBOM
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}@${{ steps.build-image.outputs.digest }}
          format: spdx-json
          artifact-name: media-center-${{ matrix.service }}.spdx.json
          output-file: sbom/media-center-${{ matrix.service }}.spdx.json
          upload-artifact: true
          upload-release-assets: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest@v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/media-center-${{ matrix.service }}
          subject-digest: ${{ steps.build-image.outputs.digest }}
          sbom-path: sbom/media-center-${{ matrix.service }}.spdx.json
          push-to-registry: true
          create-storage-record: false
